<!DOCTYPE html>
<html>
<head>
    <title>Smart Study Tracker</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <a class="logout" href="/logout">Logout</a>
    <button onclick="toggleMode()">🌙 Dark Mode</button>

    <h1 class="title">📚 Smart Study Tracker</h1>
    <h3 class="streak">🔥 Study Streak: {{streak}} days</h3>


    <!-- GOAL SECTION -->

    <div class="goal-section">
        <h2>🎯 Daily Study Goal</h2>

        <form action="/goal" method="post">
            <input type="number" step="0.1" name="goal" placeholder="Enter goal hours" required>
            <button>Set Goal</button>
        </form>

        <h3>Your Goal: {{goal}} hours</h3>
    </div>


    <!-- ADD STUDY -->

    <div class="add-section">
        <form action="/add" method="post">
            <input type="text" name="subject" placeholder="Enter Subject" required>
            <input type="number" step="0.1" name="hours" placeholder="Study Hours" required>
            <button>Add</button>
        </form>
    </div>


    <!-- RECORDS -->

    <div class="records-section">

        <h2>Study Records</h2>

        <table>

            <tr>
                <th>Subject</th>
                <th>Hours</th>
                <th>Date</th>
                <th>Action</th>
            </tr>

            {% for subject, hours, d in data %}

            <tr>
                <td>{{subject}}</td>
                <td>{{hours|round(2)}}</td>
                <td>{{d}}</td>
                <td>
                    <a href="/delete/{{loop.index0}}">Delete</a>
                </td>
            </tr>

            {% endfor %}

        </table>

        <h3>Total Study Hours: {{total}}</h3>

        <div class="progress">
            <div class="progress-bar"
                 style="width: {{ (total/goal*100) if goal else 0 }}%">
            </div>
        </div>

    </div>



    <!-- CHART -->

    <div class="chart-section">

        <h2>📊 Study Chart</h2>

        <canvas id="chart"></canvas>

    </div>

</div>



<script>

/* DARK MODE */

function toggleMode(){
    document.body.classList.toggle("dark");
}


/* DATA FROM FLASK */

var subjects=[
{% for subject, hours, d in data %}
"{{subject}}",
{% endfor %}
];

var hours=[
{% for subject, hours, d in data %}
{{hours}},
{% endfor %}
];


/* CHART */

var ctx=document.getElementById("chart").getContext("2d");


/* GRADIENT COLOR */

var gradient=ctx.createLinearGradient(0,0,0,400);
gradient.addColorStop(0,"#667eea");
gradient.addColorStop(1,"#764ba2");


/* CREATE CHART */

new Chart(ctx,{

    type:"bar",

    data:{
        labels:subjects,

        datasets:[{

            label:"Study Hours",

            data:hours,

            backgroundColor:gradient,

            borderRadius:15,

            borderSkipped:false

        }]
    },


    options:{

        responsive:true,

        animation:{
            duration:1500,
            easing:"easeOutBounce"
        },


        plugins:{
            legend:{
                labels:{
                    font:{
                        size:16
                    }
                }
            }
        },


        scales:{

            x:{
                grid:{
                    display:false
                }
            },

            y:{
                beginAtZero:true
            }

        }

    }

});

</script>

</body>
</html>
